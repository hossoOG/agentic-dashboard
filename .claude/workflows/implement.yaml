name: implement-feature
description: "Kompletter Entwicklungszyklus: Issue analysieren, implementieren, testen, reviewen und PR erstellen."
version: 1

inputs:
  - name: issue_id
    type: string
    required: true
    description: "GitHub Issue-Nummer (z.B. 42)"
  - name: branch_name
    type: string
    required: false
    description: "Optionaler Branch-Name (Standard: feat/issue-{issue_id})"

steps:
  - id: lessons-check
    type: agent
    model: sonnet
    prompt: "Lies tasks/lessons.md komplett. Identifiziere die 5 wichtigsten Regeln fuer Issue #{issue_id}. Gib eine kompakte Checkliste zurueck."
    read_only: true
    output: lessons_checklist

  - id: analyze
    type: agent
    model: opus
    prompt: "Analysiere Issue #{issue_id} mit `gh issue view {issue_id}`. Erstelle einen detaillierten Implementierungsplan: betroffene Dateien, Aenderungen, Risiken, Tests. Beachte: {lessons_checklist}"
    read_only: true
    output: implementation_plan
    depends_on:
      - lessons-check

  - id: implement
    type: agent
    model: sonnet
    prompt: "Implementiere Issue #{issue_id} nach folgendem Plan: {implementation_plan}. Beachte die Projekt-Konventionen aus CLAUDE.md. Schreibe Tests im selben Commit."
    worktree: true
    output: implementation_summary
    depends_on:
      - analyze

  - id: test-gate
    type: gate
    command: "npm run test"
    on_failure: retry
    max_retries: 2
    timeout_secs: 120
    depends_on:
      - implement

  - id: typecheck-gate
    type: gate
    command: "npx tsc --noEmit"
    on_failure: retry
    max_retries: 1
    timeout_secs: 60
    depends_on:
      - implement

  - id: build-gate
    type: gate
    command: "npm run build"
    on_failure: fail
    timeout_secs: 120
    depends_on:
      - typecheck-gate

  - id: rust-gate
    type: gate
    command: "cd src-tauri && cargo test && cargo clippy -- -D warnings"
    on_failure: retry
    max_retries: 1
    timeout_secs: 180
    depends_on:
      - implement

  - id: review
    type: agent
    model: opus
    prompt: "Review der Aenderungen fuer Issue #{issue_id}. Pruefe: Security (Tauri 5-Fragen), Code-Qualitaet, Test-Coverage, Konventionen. Zusammenfassung: {implementation_summary}"
    read_only: true
    output: review_result
    depends_on:
      - test-gate
      - build-gate
      - rust-gate

  - id: create-pr
    type: action
    command: "gh pr create --title 'feat: Issue #{issue_id}' --body '{review_result}'"
    capture_output: true
    output: pr_url
    depends_on:
      - review

metadata:
  author: AgenticExplorer
  tags:
    - development
    - sprint
    - automation
  estimated_duration_mins: 30

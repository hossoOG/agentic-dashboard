<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--surface-base);font-family:var(--font-body);}
.row{display:flex;gap:0;}
.swatch{flex:1;height:74px;display:flex;flex-direction:column;justify-content:flex-end;padding:6px 8px;}
.swatch .n{font-family:var(--font-mono);font-size:9px;letter-spacing:0.04em;}
.swatch .v{font-family:var(--font-mono);font-size:8px;opacity:0.65;}
</style></head><body class="dark">
<div class="row">
  <div class="swatch" style="background:var(--neutral-50);color:#fff"><div class="n">50</div><div class="v">12% L</div></div>
  <div class="swatch" style="background:var(--neutral-100);color:#fff"><div class="n">100</div><div class="v">18% L</div></div>
  <div class="swatch" style="background:var(--neutral-200);color:#fff"><div class="n">200</div><div class="v">25% L</div></div>
  <div class="swatch" style="background:var(--neutral-300);color:#fff"><div class="n">300</div><div class="v">32% L</div></div>
  <div class="swatch" style="background:var(--neutral-400);color:#fff"><div class="n">400</div><div class="v">40% L</div></div>
  <div class="swatch" style="background:var(--neutral-500);color:#fff"><div class="n">500</div><div class="v">46% L</div></div>
  <div class="swatch" style="background:var(--neutral-600);color:#000"><div class="n">600</div><div class="v">58% L</div></div>
  <div class="swatch" style="background:var(--neutral-700);color:#000"><div class="n">700</div><div class="v">82% L</div></div>
  <div class="swatch" style="background:var(--neutral-800);color:#000"><div class="n">800</div><div class="v">92% L</div></div>
  <div class="swatch" style="background:var(--neutral-900);color:#000;border:1px solid var(--neutral-700)"><div class="n">900</div><div class="v">96% L</div></div>
</div>
</body></html>

<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--surface-base);color:var(--neutral-200);font-family:var(--font-body);}
.row{display:flex;gap:12px;}
.card{flex:1;background:var(--surface-raised);border:1px solid var(--neutral-700);padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.card.active{border-color:var(--color-accent);border-left-width:2px;background:var(--accent-a10);}
.name{font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--neutral-200);}
.name.act{color:var(--color-accent);}
.path{font-family:var(--font-mono);font-size:10px;color:var(--neutral-500);}
.hdr{display:flex;align-items:center;gap:8px;}
.dot{width:8px;height:8px;border-radius:9999px;}
.elapsed{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--neutral-500);}
</style></head><body class="dark">
<div class="row">
  <div class="card active">
    <div class="hdr"><span class="dot" style="background:var(--color-accent);box-shadow:0 0 0 2px var(--accent-a40)"></span><span class="name act">agentic-dashboard</span><span class="elapsed">0:42</span></div>
    <div class="path">~/projects/agentic-dashboard</div>
  </div>
  <div class="card">
    <div class="hdr"><span class="dot" style="background:var(--color-warning)"></span><span class="name">figurato-frontend</span><span class="elapsed">2:14</span></div>
    <div class="path">~/projects/figurato-frontend</div>
  </div>
</div>
</body></html>

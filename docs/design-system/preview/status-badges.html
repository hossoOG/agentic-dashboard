<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--surface-base);font-family:var(--font-body);}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.b{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;border:1px solid;}
.dot{width:6px;height:6px;border-radius:9999px;display:inline-block;}
@keyframes p{0%,100%{opacity:1}50%{opacity:0.5}}
.pulse{animation:p 2s ease-in-out infinite;box-shadow:0 0 0 2px currentColor;opacity:0.4}
.acc{color:var(--color-accent);background:var(--accent-a10);border-color:var(--accent-a40);}
.suc{color:var(--color-success);background:oklch(68% .17 155 / .12);border-color:oklch(68% .17 155 / .4);}
.warn{color:var(--color-warning);background:oklch(75% .14 70 / .12);border-color:oklch(75% .14 70 / .4);}
.err{color:var(--color-error);background:oklch(62% .22 25 / .12);border-color:oklch(62% .22 25 / .4);}
.idle{color:var(--neutral-400);background:var(--hover-overlay);border-color:var(--neutral-600);}
</style></head><body class="dark">
<div class="row">
  <span class="b acc"><span class="dot" style="background:var(--color-accent)"></span>Läuft</span>
  <span class="b suc"><span class="dot" style="background:var(--color-success)"></span>Fertig</span>
  <span class="b warn"><span class="dot" style="background:var(--color-warning)"></span>Wartet</span>
  <span class="b err"><span class="dot" style="background:var(--color-error)"></span>Fehler</span>
  <span class="b idle"><span class="dot" style="background:var(--neutral-500)"></span>Idle</span>
</div>
</body></html>

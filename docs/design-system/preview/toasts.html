<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:18px;background:var(--surface-base);color:var(--neutral-200);font-family:var(--font-body);}
.row{display:flex;gap:10px;}
.t{flex:1;display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--surface-overlay);border:1px solid;border-left-width:2px;}
.t .ico{margin-top:1px;}
.ttl{font-family:var(--font-display);font-size:10px;font-weight:700;letter-spacing:0.14em;}
.body{font-family:var(--font-mono);font-size:11px;color:var(--neutral-300);margin-top:2px;}
.ok{border-color:var(--color-success);box-shadow:0 0 0 1px oklch(68% .17 155 / .3),0 0 10px oklch(68% .17 155 / .3);}
.ok .ttl{color:var(--color-success);}
.err{border-color:var(--color-error);box-shadow:0 0 0 1px oklch(62% .22 25 / .3),0 0 10px oklch(62% .22 25 / .3);}
.err .ttl{color:var(--color-error);}
svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
</style></head><body class="dark">
<div class="row">
  <div class="t ok"><span class="ico" style="color:var(--color-success)"><svg width="14" height="14" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg></span><div><div class="ttl">SESSION FINISHED</div><div class="body">agentic-dashboard · Exit 0 · 0:48</div></div></div>
  <div class="t err"><span class="ico" style="color:var(--color-error)"><svg width="14" height="14" viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg></span><div><div class="ttl">BUILD FAILED</div><div class="body">walletapp · Exit 1 · 0:12</div></div></div>
</div>
</body></html>

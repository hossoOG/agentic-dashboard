<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--surface-base);color:var(--neutral-200);font-family:var(--font-body);}
.row{display:flex;gap:10px;align-items:flex-start;}
.sw{width:120px;}
.sw .chip{height:56px;border:1px solid var(--neutral-700);}
.sw .lbl{font-family:var(--font-mono);font-size:9px;color:var(--neutral-400);margin-top:4px;letter-spacing:0.04em;}
.sw .val{font-family:var(--font-mono);font-size:8px;color:var(--neutral-500);margin-top:2px;}
</style></head><body class="dark">
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--color-accent)"></div><div class="lbl">accent</div><div class="val">oklch(72% .14 190)</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-accent-light)"></div><div class="lbl">accent-light</div><div class="val">oklch(85% .08 190)</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-accent-dark)"></div><div class="lbl">accent-dark</div><div class="val">oklch(55% .14 190)</div></div>
  <div class="sw"><div class="chip" style="background:var(--accent-a30)"></div><div class="lbl">accent-a30</div><div class="val">.30 alpha</div></div>
  <div class="sw"><div class="chip" style="background:var(--accent-a10)"></div><div class="lbl">accent-a10</div><div class="val">.10 alpha</div></div>
</div>
</body></html>

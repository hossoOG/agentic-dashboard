<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--surface-base);color:var(--neutral-200);font-family:var(--font-body);}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.btn{padding:8px 16px;border-radius:0;font-family:var(--font-body);font-size:12px;font-weight:500;cursor:pointer;transition:all 150ms cubic-bezier(0.16,1,0.3,1);display:inline-flex;align-items:center;gap:6px;}
.primary{background:var(--color-success);color:oklch(12% .01 250);border:1px solid transparent;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;}
.secondary{background:transparent;color:var(--neutral-400);border:1px solid var(--neutral-700);}
.ghost{background:transparent;color:var(--neutral-400);border:1px solid transparent;}
.danger{background:oklch(62% .22 25 / .10);color:oklch(62% .22 25);border:1px solid oklch(62% .22 25 / .40);}
.small{padding:4px 10px;font-size:11px;}
</style></head><body class="dark">
<div class="row">
  <button class="btn primary">Session starten</button>
  <button class="btn secondary">Abbrechen</button>
  <button class="btn ghost">Option</button>
  <button class="btn danger">Beenden</button>
  <button class="btn secondary small">small</button>
</div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head>
<body style="padding:20px">
<div class="row" style="gap:14px;flex-wrap:wrap">
  <div class="col"><div style="width:4px;height:40px;background:var(--color-accent)"></div><div class="mono">xs · 4</div></div>
  <div class="col"><div style="width:8px;height:40px;background:var(--color-accent)"></div><div class="mono">sm · 8</div></div>
  <div class="col"><div style="width:12px;height:40px;background:var(--color-accent)"></div><div class="mono">md · 12</div></div>
  <div class="col"><div style="width:16px;height:40px;background:var(--color-accent)"></div><div class="mono">lg · 16</div></div>
  <div class="col"><div style="width:24px;height:40px;background:var(--color-accent)"></div><div class="mono">xl · 24</div></div>
  <div class="col"><div style="width:32px;height:40px;background:var(--color-accent)"></div><div class="mono">2xl · 32</div></div>
  <div class="col"><div style="width:48px;height:40px;background:var(--color-accent)"></div><div class="mono">3xl · 48</div></div>
  <div class="col" style="margin-left:auto;max-width:170px">
    <div class="label">4pt base</div>
    <div style="font-size:11px;color:var(--neutral-400);line-height:1.5">Dense UI: most paddings are sm (8) or md (12). xl+ mostly for section gutters.</div>
  </div>
</div>
</body></html>

<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--surface-base);color:var(--neutral-200);font-family:var(--font-body);}
.row{display:flex;gap:18px;align-items:flex-end;}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px;}
.sq{width:56px;height:56px;background:var(--surface-raised);border:1px solid var(--neutral-700);}
.lbl{font-family:var(--font-mono);font-size:9px;color:var(--neutral-500);letter-spacing:0.04em;}
</style></head><body class="dark">
<div class="row">
  <div class="cell"><div class="sq" style="border-radius:0"></div><div class="lbl">0 · default</div></div>
  <div class="cell"><div class="sq" style="border-radius:2px"></div><div class="lbl">2 · kanban</div></div>
  <div class="cell"><div class="sq" style="border-radius:9999px"></div><div class="lbl">full · dots only</div></div>
</div>
</body></html>

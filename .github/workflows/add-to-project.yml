name: Sync to Global Board
on:
  issues:
    types: [opened, labeled]

env:
  PROJECT_ID:       PVT_kwHOBU0NTM4BUl2C
  STATUS_FIELD_ID:  PVTSSF_lAHOBU0NTM4BUl2CzhBs-SI
  TODO_OPTION_ID:   f75ad846
  READY_OPTION_ID:  e388f9db
  PROJECT_NUMBER:   "4"
  PROJECT_OWNER:    hossoOG

jobs:
  add-new-issue:
    # Every new issue → Board #4, Status=Todo
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project + set Status=Todo
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          ITEM_ID=$(gh project item-add "$PROJECT_NUMBER" \
            --owner "$PROJECT_OWNER" \
            --url "${{ github.event.issue.html_url }}" \
            --format json --jq '.id')
          gh project item-edit \
            --id "$ITEM_ID" \
            --project-id "$PROJECT_ID" \
            --field-id "$STATUS_FIELD_ID" \
            --single-select-option-id "$TODO_OPTION_ID"

  move-to-ready:
    # Issues with 'ready' label → Status=Ready (Autopilot-signal)
    if: github.event.action == 'labeled' && github.event.label.name == 'ready'
    runs-on: ubuntu-latest
    steps:
      - name: Find or add item + set Status=Ready
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          # gh project item-add is idempotent: returns existing id if already in project
          ITEM_ID=$(gh project item-add "$PROJECT_NUMBER" \
            --owner "$PROJECT_OWNER" \
            --url "${{ github.event.issue.html_url }}" \
            --format json --jq '.id')
          gh project item-edit \
            --id "$ITEM_ID" \
            --project-id "$PROJECT_ID" \
            --field-id "$STATUS_FIELD_ID" \
            --single-select-option-id "$READY_OPTION_ID"
